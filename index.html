<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nutmegs Poem</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Cormorant Garamond", serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f7f5f2;
      color: #2c2c2c;
      position: relative;
      overflow-y: auto;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(
        ellipse at center,
        rgba(255,255,255,0) 60%,
        rgba(0,0,0,0.12) 100%
      );
    }

    body::after {
      content: "";
      position: fixed;
      inset: 18px;
      border: 1px solid rgba(0,0,0,0.08);
      pointer-events: none;
    }

    .container {
      max-width: 720px;
      padding: 60px 30px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .poem {
      white-space: pre-line;
      font-size: 1.25rem;
      line-height: 1.7;
    }

    .title {
      font-size: 1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 40px;
      color: #777;
    }

    .signature {
      margin-top: 40px;
      font-size: 1rem;
      color: #555;
      font-style: italic;
    }

    em {
      font-style: italic;
    }

    @media (max-width: 600px) {
      .poem {
        font-size: 1.05rem;
      }
      .container {
        padding: 40px 20px;
      }
    }
  </style>
</head>

<body>
  <h1>Where once there was a colosseum now is ashes, all roads lead away from Rome, neither soul nor mate</h1>
</body>
